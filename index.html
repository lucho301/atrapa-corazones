<!DOCTYPE html>
<html lang="es" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapa Corazones ❤️ </title>
  <link rel="stylesheet" href="./style.css">
    
</head>
<body>

<div class="game-wrapper">
  <div class="game-container">
    <div class="frame">
      <svg id="game" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 450 680">
        <defs>
          <linearGradient id="romantic-sky" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8B195;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#FFC3D0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FCC5DC;stop-opacity:1" />
          </linearGradient>

          <filter id="card-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
          </filter>
          </defs>
        <path fill="url(#romantic-sky)" d="M0 0h450v680H0z"/>
        <path fill-opacity=".7" fill="#fff" d="M104.14 183.7c1.5-19.5-32-23-32-1.5-15.5-5.5-20.5 13.5-12.5 16 14.5 0 43.5.5 55 .5 10.5-4-.5-22-10.5-15Zm295.5-2c1.64-21.26-33-24.5-34.5-3.5-18.5-6-24.26 16.96-15.5 19.68h60.84c11.49-4.36.11-23.82-10.84-16.18ZM93.08 379.91c1.79-23.22-34.94-29.21-41.44-2.21-16.5-8-22.68 16.9-13.12 19.88h66.38c12.55-4.76.12-26.01-11.82-17.67Zm192.56-69.21c1.3-16-22.8-22.1-27.5-3.5-11.92-5.51-18.64 12.45-11.74 14.5h47.96c9.06-3.28-.09-16.74-8.72-11Zm16 232.5c1.31-16.63-24.76-21.84-29.5-2.5-12.03-5.73-18.16 12.84-11.19 14.97h48.41c10.28-3.47.99-18.44-7.72-12.47Z"/>
        <rect width="430" height="54" x="10" y="10" fill="#FFC0CB" rx="12" stroke="#C44D4D" stroke-width="3"/>
        <g fill="#B22222" font-family="Courier, monospace" font-size="28px" font-weight="bold">
            <text id="score" x="25" y="46" >0</text>
            <g id="lives-container"></g>
            <text id="win-message" x="225" y="46" text-anchor="middle" fill="#B22222" font-size="32px" visibility="hidden">Felicidades corazon de melon</text>
        </g>
        <g font-size="36" id="game-over-screen" pointer-events="none" visibility="hidden" >
            <text x="225" y="220" text-anchor="middle" stroke="#6D2929" stroke-width="10">FIN DEL JUEGO</text>
            <text x="225" y="220" text-anchor="middle" fill="#E41B17">FIN DEL JUEGO</text>
            <text id="final-score-info" x="225" y="260" text-anchor="middle" font-size="24" fill="white">Puntuación: 0</text>
        </g>
        
        <image id="love-letter" xlink:href="gano.png" x="25" y="90" width="400" height="600" visibility="hidden" filter="url(#card-shadow)"/>
        <symbol id="heart" viewBox="0 0 100 70"><g class="heart__wings"><path transform="translate(2.5, -5)" fill="#FFF0F5" stroke="#A4243B" stroke-linejoin="round" stroke-width="2" d="M3.793 18.165c.905-.484 1.938-.526 2.887-.399 1.88.252 4.141 1.27 6.375 2.527 3.967 2.234 8.385 5.539 11.558 8.103l1.279 1.048.105.096a1.5 1.5 0 0 1 .424.87l1.47 11.701a1.5 1.5 0 0 1-.432 1.254c-3.981 3.94-8.147 4.232-10.628 2.541-1.168-.796-2.067-2.187-1.735-3.753.053-.25.135-.483.24-.702-1.743-.454-3.15-1.018-4.257-1.658-1.747-1.01-2.903-2.31-3.22-3.799-.292-1.363.181-2.602 1.058-3.47-1.424-.708-2.823-1.57-4-2.646-2.349-2.147-3.818-5.157-2.921-9.21l.05-.2c.265-.997.838-1.817 1.747-2.303Z"/><path transform="translate(97.5, -5) scale(-1, 1)" fill="#FFF0F5" stroke="#A4243B" stroke-linejoin="round" stroke-width="2" d="M3.793 18.165c.905-.484 1.938-.526 2.887-.399 1.88.252 4.141 1.27 6.375 2.527 3.967 2.234 8.385 5.539 11.558 8.103l1.279 1.048.105.096a1.5 1.5 0 0 1 .424.87l1.47 11.701a1.5 1.5 0 0 1-.432 1.254c-3.981 3.94-8.147 4.232-10.628 2.541-1.168-.796-2.067-2.187-1.735-3.753.053-.25.135-.483.24-.702-1.743-.454-3.15-1.018-4.257-1.658-1.747-1.01-2.903-2.31-3.22-3.799-.292-1.363.181-2.602 1.058-3.47-1.424-.708-2.823-1.57-4-2.646-2.349-2.147-3.818-5.157-2.921-9.21l.05-.2c.265-.997.838-1.817 1.747-2.303Z"/></g><g transform="translate(10, 0)"><path class="heart__body" fill="#E63946" stroke="#A4243B" stroke-width="3" d="M40,60 C 40,60 10,45 10,25 C 10,10 30,10 40,25 C 50,10 70,10 70,25 C 70,45 40,60 40,60 Z" /><path stroke="#A4243B" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M36 38 Q 40 42 44 38" /><g class="heart__eyes"><circle fill="#442614" cx="32" cy="32" r="3" /><circle fill="#442614" cx="48" cy="32" r="3" /></g></g></symbol>
        <symbol id="life-heart" viewBox="0 0 30 30"><path fill="#E63946" stroke="#A4243B" stroke-width="2" d="M15 25 C 15 25 2 18 2 10 C 2 4 11 4 15 11 C 19 4 28 4 28 10 C 28 18 15 25 15 25 Z" /></symbol>
      </svg>
    </div>

    <div id="start-screen">
      <h1 style="font-family: 'Courier', monospace; text-align: center;">Atrapa 20 Corazones ❤️</h1>
      <button id="start-button" class="game-btn">Iniciar</button>
    </div>
  </div>

  <button id="restart-game-button" class="game-btn" style="display: none;">Jugar de Nuevo</button>
</div>

<script  src="./script.js"></script>

</body>
